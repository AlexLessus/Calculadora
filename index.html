<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="calculator-container">
        <h2>Calculadora</h2>
        <div class="display">
            <input type="text" id="screen" readonly placeholder="0">
        </div>
        <div class="keypad">
            <button onclick="clearScreen()" class="btn-clear">C</button>
            <button onclick="appendValue('/')" class="btn-divide">/</button>
            <button onclick="appendValue('*')" class="btn-multiple">×</button>
            <button onclick="deleteLast()" class="btn-delete">DEL</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('-')" class="btn-subtract">−</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('+')" class="btn-plus">+</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="calculate()" class="btn-equals">=</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')" class="btn-special">.</button>
            <button onclick="calcSqrt()" class="btn-special">√</button>
            <button onclick="appendValue('^')" class="btn-special">^</button>

            <button onclick="solveEquation()" class="btn-special">Ecuación</button>
            <button onclick="showEquationExample()" class="btn-example">Ejemplo Eqn</button>
        </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
